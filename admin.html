<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Support - InterServer</title>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Admin specific styles */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Source Sans Pro', sans-serif; background: #f4f7f6; padding: 40px; }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { margin-bottom: 30px; color: #333; }
        .ticket-list { display: grid; gap: 20px; }
        .ticket-item { background: white; padding: 20px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-left: 5px solid #007bff; }
        .item-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .user-info { font-weight: 600; color: #555; font-size: 14px; }
        .btn-reply { background: #007bff; color: white; border: none; padding: 8px 15px; border-radius: 3px; cursor: pointer; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 600px; padding: 25px; border-radius: 5px; }
        textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 3px; font-family: inherit; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Admin Control Panel - Ticket Management</h1>
        <div id="adminTickets" class="ticket-list">
            <!-- All tickets loaded here -->
        </div>
    </div>

    <!-- Admin Reply Modal -->
    <div id="adminReplyModal" class="modal">
        <div class="modal-content">
            <h2>Reply to Ticket</h2>
            <div id="ticketDetails" style="margin: 15px 0; padding: 10px; background: #eee; font-size: 14px;"></div>
            <textarea id="adminReplyMessage" rows="6" placeholder="Type your response..."></textarea>
            <button id="sendAdminReply" class="btn-reply" style="width: 100%;">Send Official Response</button>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'https://interserver-backend.vercel.app';
        const token = localStorage.getItem('token');

        if (!token) window.location.href = 'login.html';

        const loadAllTickets = async () => {
            const res = await fetch(`${API_BASE_URL}/api/tickets/all`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const tickets = await res.json();
            const container = document.getElementById('adminTickets');
            container.innerHTML = '';

            tickets.forEach(ticket => {
                const div = document.createElement('div');
                div.className = 'ticket-item';
                div.innerHTML = `
                    <div class="item-header">
                        <span style="font-size: 18px; font-weight: 600;">${ticket.subject}</span>
                        <span style="color: #777;">${new Date(ticket.createdAt).toLocaleDateString()}</span>
                    </div>
                    <div class="user-info">From: ${ticket.userId ? ticket.userId.name : 'Unknown'} (${ticket.userId ? ticket.userId.email : 'N/A'})</div>
                    <p style="margin: 15px 0; color: #444;">${ticket.message}</p>
                    <div style="font-size: 13px; color: #007bff; margin-bottom: 10px;">Replies: ${ticket.replies.length}</div>
                    <button onclick="openAdminReply('${ticket._id}', '${ticket.subject.replace(/'/g, "\\'")}')" class="btn-reply">Manage Ticket</button>
                `;
                container.appendChild(div);
            });
        };

        let currentTicketId = null;
        window.openAdminReply = (id, subject) => {
            currentTicketId = id;
            document.getElementById('ticketDetails').textContent = `Subject: ${subject}`;
            document.getElementById('adminReplyModal').style.display = 'flex';
        };

        document.getElementById('sendAdminReply').onclick = async () => {
            const message = document.getElementById('adminReplyMessage').value;
            if(!message) return;

            const res = await fetch(`${API_BASE_URL}/api/tickets/${currentTicketId}/reply`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ message, isAdmin: true })
            });

            if (res.ok) {
                document.getElementById('adminReplyModal').style.display = 'none';
                document.getElementById('adminReplyMessage').value = '';
                loadAllTickets();
            }
        };

        window.onclick = (e) => { if(e.target.className === 'modal') e.target.style.display = 'none'; };

        loadAllTickets();
    </script>
</body>
</html>
